name: Flask TODO CI

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Python tests
    runs-on: ubuntu-latest

    steps:
      # Download the repository code into the GitHub Actions runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Python so the Flask application and tests can run.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install the project dependencies listed in requirements.txt.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run the automated tests with pytest.
      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest

      # Build the Flask Docker image to verify the Dockerfile works.
      - name: Build Docker image
        run: docker build -t flask-todo-app:ci .

      # Log in to Docker Hub using GitHub Secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag the verified image with latest and the commit SHA.
      - name: Tag Docker image
        run: |
          docker tag flask-todo-app:ci shlomodevops/devops-final-projectshlomo:latest
          docker tag flask-todo-app:ci shlomodevops/devops-final-projectshlomo:${{ github.sha }}

      # Push both tags to Docker Hub.
      - name: Push Docker image
        run: |
          docker push shlomodevops/devops-final-projectshlomo:latest
          docker push shlomodevops/devops-final-projectshlomo:${{ github.sha }}
