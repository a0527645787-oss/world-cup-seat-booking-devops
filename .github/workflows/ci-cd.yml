name: Flask TODO CI

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Python tests
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.image_tag.outputs.short_sha }}

    steps:
      # Download the repository code into the GitHub Actions runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Python so the Flask application and tests can run.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install the project dependencies listed in requirements.txt.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run the automated tests with pytest.
      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest

      # Build the Flask Docker image to verify the Dockerfile works.
      - name: Build Docker image
        run: docker build -t flask-todo-app:ci .

      # Store a short commit SHA for a readable, rollback-friendly image tag.
      - name: Set Docker image tag
        id: image_tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # Log in to Docker Hub using GitHub Secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag the verified image with latest and the short commit SHA.
      - name: Tag Docker image
        run: |
          docker tag flask-todo-app:ci shlomodevops/devops-final-projectshlomo:latest
          docker tag flask-todo-app:ci shlomodevops/devops-final-projectshlomo:${SHORT_SHA}

      # Push both tags to Docker Hub.
      - name: Push Docker image
        run: |
          docker push shlomodevops/devops-final-projectshlomo:latest
          docker push shlomodevops/devops-final-projectshlomo:${SHORT_SHA}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      # Connect to the EC2 server and restart the production Docker Compose stack.
      - name: Deploy production stack over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            cd ~/seat-booking-devops
            git pull origin main
            IMAGE_TAG="${{ needs.test.outputs.short_sha }}"
            if [ -f .env ] && grep -q '^IMAGE_TAG=' .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env
            else
              printf "\nIMAGE_TAG=%s\n" "$IMAGE_TAG" >> .env
            fi
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            set +e

            for i in $(seq 1 12); do
              if curl -fsS http://localhost/health; then
                echo "Health check passed"
                exit 0
              fi
              echo "Health check failed, retrying attempt $i..."
              sleep 5
            done

            echo "Health check failed after retries"
            docker ps
            docker logs --tail=80 flask_app_prod
            docker logs --tail=80 nginx_proxy_prod
            exit 1
