name: World Cup Seat Booking CI/CD

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Python tests
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.image_tag.outputs.short_sha }}

    steps:
      # Download the repository code into the GitHub Actions runner.
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Python so the Flask application and tests can run.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install the project dependencies listed in requirements.txt.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Run the automated tests with pytest.
      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest

      # Build the Flask Docker image to verify the Dockerfile works.
      - name: Build Docker image
        run: docker build -t seat-booking-app:ci .

      # Store a short commit SHA for a readable, rollback-friendly image tag.
      - name: Set Docker image tag
        id: image_tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # Log in to Docker Hub using GitHub Secrets.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag the verified image with latest and the short commit SHA.
      - name: Tag Docker image
        run: |
          docker tag seat-booking-app:ci shlomodevops/devops-final-projectshlomo:latest
          docker tag seat-booking-app:ci shlomodevops/devops-final-projectshlomo:${SHORT_SHA}

      # Push both tags to Docker Hub.
      - name: Push Docker image
        run: |
          docker push shlomodevops/devops-final-projectshlomo:latest
          docker push shlomodevops/devops-final-projectshlomo:${SHORT_SHA}

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      # Connect to the EC2 server and restart the production Docker Compose stack.
      - name: Deploy production stack over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          script: |
            set -Eeuo pipefail

            cd ~/seat-booking-devops

            echo "Current server commit before pull:"
            git rev-parse --short HEAD

            git pull origin main

            IMAGE_TAG="${{ needs.test.outputs.short_sha }}"
            echo "NEW_IMAGE_TAG=${IMAGE_TAG}"

            if [ ! -f .env ]; then
              echo "ERROR: .env file is missing on EC2. Production secrets are expected to exist on the server."
              exit 1
            fi

            if grep -q '^IMAGE_TAG=' .env; then
              PREVIOUS_IMAGE_TAG="$(grep '^IMAGE_TAG=' .env | tail -n 1 | cut -d '=' -f 2-)"
            else
              PREVIOUS_IMAGE_TAG="latest"
            fi

            echo "Previous IMAGE_TAG from .env: ${PREVIOUS_IMAGE_TAG}"
            printf "%s\n" "$PREVIOUS_IMAGE_TAG" > .previous_image_tag

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${IMAGE_TAG}/" .env
            else
              printf "\nIMAGE_TAG=%s\n" "$IMAGE_TAG" >> .env
            fi

            echo ".env IMAGE_TAG after update:"
            grep '^IMAGE_TAG=' .env

            echo "Docker Compose resolved app image:"
            docker compose --env-file .env -f docker-compose.prod.yml config | grep 'image: shlomodevops/devops-final-projectshlomo:'

            docker compose --env-file .env -f docker-compose.prod.yml pull app
            docker compose --env-file .env -f docker-compose.prod.yml up -d

            echo "Docker Compose status after deploy:"
            docker compose --env-file .env -f docker-compose.prod.yml ps

            RUNNING_IMAGE="$(docker inspect flask_app_prod --format='{{.Config.Image}}')"
            echo "Running Docker image after deploy: ${RUNNING_IMAGE}"

            for i in $(seq 1 12); do
              if curl -fsS http://localhost/health; then
                echo "Deployment health check passed"
                echo "Running IMAGE_TAG=${IMAGE_TAG}"
                docker image prune -f
                exit 0
              fi
              echo "Health check failed, retrying attempt $i..."
              sleep 5
            done

            echo "Health check failed after deploying IMAGE_TAG=${IMAGE_TAG}"
            echo "Rolling back to previous IMAGE_TAG=${PREVIOUS_IMAGE_TAG}"

            if grep -q '^IMAGE_TAG=' .env; then
              sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=${PREVIOUS_IMAGE_TAG}/" .env
            else
              printf "\nIMAGE_TAG=%s\n" "$PREVIOUS_IMAGE_TAG" >> .env
            fi

            echo ".env IMAGE_TAG after rollback update:"
            grep '^IMAGE_TAG=' .env

            docker compose --env-file .env -f docker-compose.prod.yml pull app
            docker compose --env-file .env -f docker-compose.prod.yml up -d

            echo "Docker Compose status after rollback:"
            docker compose --env-file .env -f docker-compose.prod.yml ps

            ROLLBACK_IMAGE="$(docker inspect flask_app_prod --format='{{.Config.Image}}')"
            echo "Running Docker image after rollback: ${ROLLBACK_IMAGE}"

            for i in $(seq 1 12); do
              if curl -fsS http://localhost/health; then
                echo "Rollback succeeded"
                exit 1
              fi
              echo "Rollback health check failed, retrying attempt $i..."
              sleep 5
            done

            echo "Rollback failed. Manual intervention required."
            docker compose --env-file .env -f docker-compose.prod.yml ps
            docker logs --tail=120 flask_app_prod
            docker logs --tail=80 nginx_proxy_prod
            exit 1
