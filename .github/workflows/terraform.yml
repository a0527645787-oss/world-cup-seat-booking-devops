name: Terraform

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply after plan"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_VAR_allowed_ssh_cidr: ${{ secrets.TF_VAR_allowed_ssh_cidr }}
      TF_VAR_allowed_grafana_cidr: ${{ secrets.TF_VAR_allowed_grafana_cidr }}
      TF_VAR_existing_key_pair_name: ${{ secrets.TF_VAR_existing_key_pair_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Initialize Terraform
        run: terraform init -input=false

      - name: Validate Terraform configuration
        run: terraform validate

      - name: Export optional Terraform variables
        run: |
          if [ -n "${{ secrets.TF_VAR_existing_eip_allocation_id }}" ]; then
            echo "TF_VAR_existing_eip_allocation_id=${{ secrets.TF_VAR_existing_eip_allocation_id }}" >> "$GITHUB_ENV"
          fi

      - name: Create Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Apply Terraform changes
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true'
        run: terraform apply -input=false -auto-approve tfplan
