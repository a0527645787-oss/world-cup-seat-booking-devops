# Production-style Compose file.
# This file runs the already published Flask image from Docker Hub.

services:
  nginx:
    # Expose Nginx as the public HTTP entrypoint.
    image: nginx:alpine
    container_name: nginx_proxy_prod
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    # Use the image that GitHub Actions pushed to Docker Hub.
    image: shlomodevops/devops-final-projectshlomo:latest
    container_name: flask_app_prod
    restart: unless-stopped
    environment:
      # Flask database connection settings.
      APP_ENV: ${APP_ENV:-production}
      DB_HOST: mysql
      DB_NAME: ${DB_NAME:-flask}
      DB_USER: ${DB_USER:-flask}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in your environment or .env file}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in your environment or .env file}
    depends_on:
      # Start MySQL before starting the Flask container.
      - mysql
    ports:
      # Host port 5001 -> container port 5000.
      - "5001:5000"

  mysql:
    # Use MySQL 8.0 for the database container.
    image: mysql:8.0
    container_name: mysql_prod
    restart: unless-stopped
    environment:
      # Demo credentials for local project use.
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
      MYSQL_DATABASE: ${DB_NAME:-flask}
      MYSQL_USER: ${DB_USER:-flask}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}
    ports:
      - "3307:3306"
    volumes:
      # Keep MySQL data even if the container is recreated.
      - mysql-prod-data:/var/lib/mysql

volumes:
  mysql-prod-data:
    driver: local
