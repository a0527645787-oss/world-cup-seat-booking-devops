services:
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    image: flask_app:latest
    container_name: flask_app
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: ${DB_HOST:-mysql}
      DB_NAME: ${DB_NAME:-flask}
      DB_USER: ${DB_USER:-flask}
      DB_PASSWORD: ${DB_PASSWORD:-change-me}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
    depends_on:
      - mysql
    ports:
      - "5001:5000"

  mysql:
    container_name: mysql
    image: mysql:8.0
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/mysqld.cnf:/etc/mysql/mysql.conf.d/mysqld.cnf
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
      MYSQL_DATABASE: ${DB_NAME:-flask}
      MYSQL_USER: ${DB_USER:-flask}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change-me}

volumes:
  mysql-data:
    driver: local
