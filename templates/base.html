<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}World Cup Seat Booking{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand" href="{{ url_for('index') }}">World Cup Seats</a>
            <nav class="site-nav">
                <a href="{{ url_for('index') }}">Matches</a>
                <a href="{{ url_for('manage_booking') }}">Manage Booking</a>
                <a href="{{ url_for('about') }}">About</a>
                {% if session.get("admin_logged_in") %}
                    <a href="{{ url_for('admin_bookings') }}">Admin</a>
                    <a href="{{ url_for('admin_logout') }}">Logout</a>
                {% else %}
                    <a href="{{ url_for('admin_login') }}">Admin Login</a>
                {% endif %}
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
